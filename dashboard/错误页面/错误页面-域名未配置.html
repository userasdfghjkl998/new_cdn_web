<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>飞盾CDN 域名未配置</title>
  <style>
    :root {
      --brand: #2981ff;
      --text-main: #1c1d1f;
      --text-sub: #626266;
      --line: #eaebef;
      --bg: #f4f6fa;
      --card: #ffffff;
      --soft: #f8faff;
      --danger: #dc2626;
      --shadow: 0 12px 36px rgba(18, 51, 100, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(1000px 600px at -10% -20%, rgba(41, 129, 255, 0.11), transparent 65%),
        radial-gradient(900px 520px at 110% 120%, rgba(41, 129, 255, 0.08), transparent 62%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .guard-card {
      width: min(92vw, 620px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .guard-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--brand), transparent);
    }
    .guard-head {
      padding: 22px 22px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .guard-brand { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .guard-logo {
      width: 28px; height: 28px; border-radius: 8px; object-fit: cover;
      border: 1px solid var(--line); background: #fff; flex: 0 0 auto;
    }
    .guard-badge {
      font-size: 12px; color: var(--brand);
      border: 1px solid rgba(41, 129, 255, 0.28);
      background: rgba(41, 129, 255, 0.08);
      border-radius: 999px; padding: 6px 10px; line-height: 1; white-space: nowrap;
    }
    .guard-lang {
      font-size: 12px; color: var(--text-sub);
      border: 1px solid var(--line); background: #fff;
      border-radius: 999px; padding: 6px 10px; line-height: 1; white-space: nowrap;
    }
    .guard-main { padding: 14px 22px 24px; text-align: left; }
    .head-line { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
    .error-label { font-size: 15px; color: var(--text-sub); }
    .error-code { font-size: 46px; line-height: 1; font-weight: 300; color: var(--danger); }
    .title { font-size: 30px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
    .ip-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .ip-item {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--line); background: var(--soft);
      border-radius: 8px; padding: 6px 10px; font-size: 13px; color: #374151;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      word-break: break-all;
    }
    .section {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }
    .section h2 { font-size: 18px; line-height: 1.35; font-weight: 600; margin-bottom: 8px; }
    .section p { font-size: 14px; line-height: 1.6; color: var(--text-sub); margin-top: 6px; }
    .guard-footer { margin-top: 14px; color: var(--text-sub); font-size: 12px; line-height: 1.5; text-align: center; }
  </style>
</head>
<body>
  <section class="guard-card">
    <header class="guard-head">
      <div class="guard-brand">
        <img class="guard-logo" id="brandLogo" alt="Brand Logo">
        <span class="guard-badge" id="badgeText">飞盾安全防护已启用</span>
      </div>
      <span class="guard-lang" id="langTag">ZH</span>
    </header>
    <main class="guard-main">
      <div class="head-line">
        <span class="error-label" id="errorLabel">错误</span>
        <span class="error-code">530</span>
      </div>
      <h1 class="title" id="title">域名未配置</h1>
      <div class="ip-row">
        <span class="ip-item" id="clientIpLabel">您的IP: {client_ip}</span>
        <span class="ip-item" id="nodeIpLabel">节点IP: {node_ip}</span>
      </div>
      <section class="section">
        <h2 id="whatHappenedTitle">什么问题?</h2>
        <p id="whatHappenedText">当前域名已解析至 CDN 节点，但域名配置未生效，或该域名尚未在 CDN 平台完成接入。</p>
      </section>
      <section class="section">
        <h2 id="resolutionTitle">如何解决?</h2>
        <p id="resolutionText1">如果您是网站用户，请联系网站管理员确认域名接入状态。</p>
        <p id="resolutionText2">如果您是网站管理员，请在 CDN 控制台添加并启用该域名，确认 CNAME 解析记录、生效状态及证书配置正确。</p>
      </section>
      <p class="guard-footer" id="footerText">建议在变更后等待 DNS 生效并进行连通性验证。</p>
    </main>
  </section>
